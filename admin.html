<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>イベント管理（運営用）</title>
<link rel="stylesheet" href="style.css?v=20260309">

<style>

.page-white{
max-width:600px;
margin:20px auto;
font-family:sans-serif;
}

h1{
font-size:20px;
margin-bottom:12px;
}

textarea{
width:100%;
height:220px;
font-size:14px;
padding:8px;
box-sizing:border-box;
}

button{
margin-top:12px;
padding:10px;
width:100%;
font-size:16px;
cursor:pointer;
}

.note{
font-size:12px;
color:#666;
margin-top:8px;
}

.card{
background:#fff;
border-radius:10px;
padding:12px;
margin-bottom:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);

display:flex;
justify-content:space-between;
align-items:center;
gap:12px;
}

.card-title{
font-weight:600;
font-size:16px;
margin-bottom:4px;
}

.card-date{
font-size:14px;
color:#666;
margin-bottom:8px;
}

.card-buttons{
display:flex;
gap:8px;
}

.card-buttons button{
padding:4px 8px;
border:none;
border-radius:6px;
cursor:pointer;
}

.event-thumb{
width:90px;
height:90px;
object-fit:cover;
border-radius:8px;
flex-shrink:0;
}

</style>
</head>

<body class="page-white">

<h1>イベント登録（運営用）</h1>

<textarea id="announceText" placeholder="ここに告知文をそのまま貼り付けてください"></textarea>

<input type="file" id="imageInput" accept="image/*" multiple>
<p class="note">※画像は一度に最大2枚まで選択してください</p>

<button id="saveBtn">登録する</button>

<p class="note">※このページは運営専用です</p>

<div id="editForm" style="display:none;margin-top:16px;">

<h2>イベント編集</h2>

<label>タイトル</label>
<input type="text" id="editTitle" style="width:100%">

<label>日付</label>
<input type="date" id="editDate" style="width:100%">

<label>会場</label>
<input type="text" id="editVenue" style="width:100%">

<label>OPEN / START</label>
<input type="text" id="editOpen" style="width:100%">

<label>🎤 ライブ</label>
<input type="text" id="editStage" style="width:100%">

<label>📸 特典会</label>
<input type="text" id="editPhoto" style="width:100%">

<label>詳細情報</label>
<textarea id="editInfo" rows="4"></textarea>

<label>🎫 チケット</label>
<input type="text" id="editTicket" style="width:100%">

<label>🔗チケットリンク</label>
<input type="text" id="editTicketLink" style="width:100%">

<label>画像（最大2枚）</label>
<input type="file" id="editImages" accept="image/*" multiple>

<button id="updateBtn">更新する</button>

</div>

<hr>

<h2>登録済みイベント一覧</h2>

<p style="margin-top:16px;">
<a href="past.html">▶ 過去イベントはこちら</a>
</p>

<div id="eventList"></div>

<script>
const API="https://event-api.t87.workers.dev";

let editingId=null;

async function getEvents(){

try{

const res=await fetch(API+"/events");

return await res.json();

}catch{

return [];

}

}

function generateId(){

return Date.now().toString(36)+Math.random().toString(36).substring(2,8);

}

function resizeImage(file,maxSize=600){

return new Promise(resolve=>{

const img=new Image();

const reader=new FileReader();

reader.onload=()=>{

img.onload=()=>{

const canvas=document.createElement("canvas");

const scale=Math.min(maxSize/img.width,maxSize/img.height,1);

canvas.width=img.width*scale;

canvas.height=img.height*scale;

const ctx=canvas.getContext("2d");

ctx.drawImage(img,0,0,canvas.width,canvas.height);

resolve(canvas.toDataURL("image/jpeg",0.6));

};

img.src=reader.result;

};

reader.readAsDataURL(file);

});

}

function loadImages(files){

return Promise.all(

Array.from(files).slice(0,2).map(file=>resizeImage(file))

);

}

function parseAnnounce(text){

const result={

title:null,

date:null,

venue:null,

openLine:null,

stageTime:null,

photoTime:null,

infoText:null,

rawText:text,

ticket:null,

ticketLink:null

};

const lines=text.split("\n");

const titleMatch=text.match(/『(.+?)』/);

result.title=titleMatch?titleMatch[1]:lines[0].trim();

const dateMatch=text.match(/(\d{1,2})月(\d{1,2})日/);

if(dateMatch){

const now=new Date();

let year=now.getFullYear();

const month=dateMatch[1].padStart(2,"0");

const day=dateMatch[2].padStart(2,"0");

if(parseInt(month)<now.getMonth()+1)year++;

result.date=`${year}-${month}-${day}`;

}

const venueMatch=text.match(/📍\s*([^\n]+)/);

if(venueMatch)result.venue=venueMatch[1].trim();

const openLineIndex=lines.findIndex(line=>

(line.includes("OPEN")||line.includes("開場"))&&

(line.includes("START")||line.includes("開演"))

);

if(openLineIndex!==-1)result.openLine=lines[openLineIndex].trim();

let infoLines=[];
for(let i=openLineIndex+1;i<lines.length;i++){

const line=lines[i].trim();

if(line==="") break;

infoLines.push(line);

}

result.infoText=infoLines.join("\n");

const stageMatch=text.match(/🎤\s*([^\n]+)/);

if(stageMatch)result.stageTime=stageMatch[1].trim();

const photoMatch=text.match(/📸\s*([^\n]+)/);

if(photoMatch)result.photoTime=photoMatch[1].trim();

const ticketMatch=text.match(/🎫\s*([^\n]+)/);

if(ticketMatch)result.ticket=ticketMatch[1].trim();

const linkMatch=text.match(/🔗\s*([^\n]+)/);

if(linkMatch)result.ticketLink=linkMatch[1].trim();

return result;

}

document.getElementById("saveBtn").addEventListener("click",async()=>{

const text=announceText.value.trim();

const files=imageInput.files;

if(!text)return alert("告知文を入力してください");

if(files.length>2)return alert("画像は最大2枚まで");

const images=files.length?await loadImages(files):[];

const parsed=parseAnnounce(text);

const event={

id:generateId(),

images,

...parsed

};

await fetch(API+"/events",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify(event)

});

announceText.value="";

imageInput.value="";

alert("保存しました");

renderEventList();

});

async function editEvent(id){

const events=await getEvents();

const event=events.find(e=>String(e.id)===String(id));

if(!event)return;

editingId=id;

document.getElementById("editForm").style.display="block";

editTitle.value=event.title||"";

editDate.value=event.date||"";

editVenue.value=event.venue||"";

editOpen.value=event.openLine||"";

editStage.value=event.stageTime||"";

editPhoto.value=event.photoTime||"";

editInfo.value=event.infoText||"";

editTicket.value=event.ticket||"";

editTicketLink.value=event.ticketLink||"";

}

async function deleteEvent(id){

if(!confirm("本当に削除しますか？"))return;

await fetch(API+"/events/"+id,{
method:"DELETE"
});
await renderEventList();

}

document.getElementById("updateBtn").addEventListener("click",async()=>{

const events=await getEvents();

const index=events.findIndex(e=>e.id===editingId);

if(index===-1)return;

const files=editImages.files;

const newImages=files.length?await loadImages(files):events[index].images;

events[index]={

...events[index],

title:editTitle.value,

date:editDate.value,

venue:editVenue.value,

openLine:editOpen.value,

stageTime:editStage.value,

photoTime:editPhoto.value,

infoText:editInfo.value,

ticket:editTicket.value,

ticketLink:editTicketLink.value,

images:newImages.slice(0,2)

};

await fetch(API+"/events/"+editingId,{

method:"PUT",

headers:{"Content-Type":"application/json"},

body:JSON.stringify(events[index])

});

editingId=null;

editImages.value="";

editForm.style.display="none";

renderEventList();

alert("更新しました");

});

async function renderEventList(){

const list=document.getElementById("eventList");

const events=await getEvents();

list.innerHTML="";

if(!events.length){

list.textContent="登録済みイベントはありません";

return;

}

const today=new Date().toISOString().slice(0,10);

events.sort((a,b)=>(a.date||"").localeCompare(b.date||""));

const upcoming=events.filter(e=>e.date>=today);

events
.filter(e=>e.date >= today)
.sort((a,b)=>a.date.localeCompare(b.date))
.forEach(event=>{

const div=document.createElement("div");

const thumb=event.images?.[0]
? `<img src="${event.images[0]}" class="event-thumb">`
: "";

div.innerHTML = `
<div class="card">

<div class="card-title">${event.title || "-"}</div>

<div class="card-date">📅 ${event.date || "-"}</div>

<div class="card-venue">📍 ${event.venue || "-"}</div>

${thumb}

<div class="card-buttons">

<button onclick="editEvent('${event.id}')">編集</button>

<button onclick="deleteEvent('${event.id}')">削除</button>

</div>

</div>
`;

list.appendChild(div);

});

}

renderEventList();

</script>

</body>
</html>
